<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="

<style>
  :root {
    --d1: #e63946; --d2: #f4a261; --d3: #2a9d8f; --d4: #3a86ff;
    --d5: #8338ec; --d6: #ff006e; --d7: #06a77d; --d8: #ffb703;
    --home: #1a1a2e;
    --bg: #f7f4ef; --panel: #ffffff; --ink: #1a1a2e; --muted: #6b6b7a;
    --border: #e5e1d8;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; color: var(--ink); background: var(--bg); }
  body { display: flex; flex-direction: column; overflow: hidden; }

  /* HEADER */
  header {
    background: var(--home); color: #fff; padding: 10px 14px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    flex-wrap: wrap; border-bottom: 3px solid #000;
  }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: 0.3px; }
  header h1 .accent { color: #ffb703; }
  header .meta { font-size: 12px; color: #cbb8a0; }

  /* FILTER BAR */
  .filters {
    display: flex; gap: 6px; overflow-x: auto; padding: 8px 10px;
    background: var(--panel); border-bottom: 1px solid var(--border);
    scrollbar-width: thin;
  }
  .filters::-webkit-scrollbar { height: 5px; }
  .filters button {
    border: 2px solid transparent; background: #eee; color: #333;
    padding: 6px 11px; font-size: 13px; font-weight: 600; border-radius: 999px;
    cursor: pointer; white-space: nowrap; transition: all .15s ease;
    min-height: 34px;
  }
  .filters button.active { color: #fff; transform: scale(1.05); }
  .filters button[data-day="all"].active { background: #1a1a2e; }
  .filters button[data-day="0"].active { background: var(--home); }
  .filters button[data-day="1"].active { background: var(--d1); }
  .filters button[data-day="2"].active { background: var(--d2); color: #1a1a2e; }
  .filters button[data-day="3"].active { background: var(--d3); }
  .filters button[data-day="4"].active { background: var(--d4); }
  .filters button[data-day="5"].active { background: var(--d5); }
  .filters button[data-day="6"].active { background: var(--d6); }
  .filters button[data-day="7"].active { background: var(--d7); }
  .filters button[data-day="8"].active { background: var(--d8); color: #1a1a2e; }

  /* LAYOUT */
  main {
    flex: 1; display: grid; grid-template-columns: minmax(320px, 420px) 1fr;
    min-height: 0;
  }
  #sidebar {
    overflow-y: auto; background: var(--panel); border-right: 1px solid var(--border);
    padding: 10px;
  }
  #map { height: 100%; width: 100%; background: #dce6ea; }

  /* DAY CARDS */
  .day-card {
    border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px;
    overflow: hidden; background: #fff;
  }
  .day-header {
    padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 10px;
    background: #fafaf7; border-left: 6px solid transparent;
    user-select: none;
  }
  .day-header .num {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 700; font-size: 13px; flex-shrink: 0;
  }
  .day-header .title { font-size: 13px; font-weight: 700; flex: 1; line-height: 1.25; }
  .day-header .title small { display: block; font-size: 11px; font-weight: 400; color: var(--muted); margin-top: 2px; }
  .day-header .toggle { font-size: 14px; color: var(--muted); transition: transform .2s; }
  .day-card.open .day-header .toggle { transform: rotate(90deg); }
  .day-card[data-day="1"] .day-header { border-left-color: var(--d1); }
  .day-card[data-day="2"] .day-header { border-left-color: var(--d2); }
  .day-card[data-day="3"] .day-header { border-left-color: var(--d3); }
  .day-card[data-day="4"] .day-header { border-left-color: var(--d4); }
  .day-card[data-day="5"] .day-header { border-left-color: var(--d5); }
  .day-card[data-day="6"] .day-header { border-left-color: var(--d6); }
  .day-card[data-day="7"] .day-header { border-left-color: var(--d7); }
  .day-card[data-day="8"] .day-header { border-left-color: var(--d8); }
  .day-card[data-day="1"] .day-header .num { background: var(--d1); }
  .day-card[data-day="2"] .day-header .num { background: var(--d2); color: #1a1a2e; }
  .day-card[data-day="3"] .day-header .num { background: var(--d3); }
  .day-card[data-day="4"] .day-header .num { background: var(--d4); }
  .day-card[data-day="5"] .day-header .num { background: var(--d5); }
  .day-card[data-day="6"] .day-header .num { background: var(--d6); }
  .day-card[data-day="7"] .day-header .num { background: var(--d7); }
  .day-card[data-day="8"] .day-header .num { background: var(--d8); color: #1a1a2e; }

  .day-body { display: none; padding: 6px 10px 10px; }
  .day-card.open .day-body { display: block; }
  .day-meta { font-size: 11px; color: var(--muted); margin-bottom: 8px; }

  .stop {
    padding: 8px 10px; border-radius: 8px; margin-bottom: 4px;
    cursor: pointer; display: flex; gap: 10px; align-items: flex-start;
    border: 1px solid transparent; transition: background .12s;
  }
  .stop:hover { background: #fafaf7; border-color: var(--border); }
  .stop .time { font-size: 11px; font-weight: 700; color: var(--muted); flex-shrink: 0; width: 44px; padding-top: 2px; }
  .stop .info { flex: 1; min-width: 0; }
  .stop .info .name { font-size: 13px; font-weight: 600; line-height: 1.3; }
  .stop .info .addr { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .stop .info .tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-top: 3px; margin-right: 4px; background: #f0ece3; color: #5c5c6b; font-weight: 600; }
  .stop .info .tag.feat { background: #fff4d6; color: #8a6400; }
  .stop .info .tag.cost { background: #ffe0e6; color: #a8244b; }

  /* MAP MARKERS */
  .marker-circle {
    display: flex; align-items: center; justify-content: center;
    width: 30px; height: 30px; border-radius: 50%;
    color: #fff; font-weight: 700; font-size: 13px;
    border: 3px solid #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.35);
    cursor: pointer;
  }
  .marker-circle.featured {
    width: 36px; height: 36px; font-size: 14px;
    border-color: #ffb703; box-shadow: 0 0 0 2px #fff, 0 3px 10px rgba(0,0,0,0.4);
  }
  .marker-home {
    width: 38px; height: 38px; border-radius: 8px;
    background: var(--home); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; border: 3px solid #ffb703;
    box-shadow: 0 3px 10px rgba(0,0,0,0.45);
  }

  /* POPUP */
  .leaflet-popup-content-wrapper { border-radius: 10px; }
  .leaflet-popup-content { margin: 12px 14px; min-width: 220px; max-width: 280px; font-size: 13px; }
  .popup h3 { margin: 0 0 4px; font-size: 15px; line-height: 1.25; }
  .popup .addr { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
  .popup .desc { font-size: 12px; line-height: 1.4; margin: 6px 0; }
  .popup .tip { background: #fff4d6; color: #6b4d00; padding: 6px 8px; border-radius: 6px; font-size: 11px; margin: 6px 0; line-height: 1.35; }
  .popup .tip::before { content: "💡 "; }
  .popup .btns { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .popup .btns a {
    flex: 1; text-align: center; padding: 7px 8px; border-radius: 6px;
    background: #1a1a2e; color: #fff !important; text-decoration: none;
    font-size: 11px; font-weight: 600; min-width: 110px;
  }
  .popup .btns a.walk { background: #2a9d8f; }
  .popup .meta { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* MOBILE */
  @media (max-width: 820px) {
    main { grid-template-columns: 1fr; grid-template-rows: 58vh 1fr; }
    #sidebar { border-right: none; border-top: 1px solid var(--border); padding: 8px; }
    header h1 { font-size: 14px; }
    header .meta { display: none; }
  }

  .active-stop { background: #fff4d6 !important; border-color: #ffb703 !important; }

  /* SCROLLBAR (desktop) */
  #sidebar::-webkit-scrollbar { width: 8px; }
  #sidebar::-webkit-scrollbar-thumb { background: #d4cdbc; border-radius: 4px; }
</style>
</head>

const DAY_COLORS = {
  0: "#1a1a2e",
  1: "#e63946", 2: "#f4a261", 3: "#2a9d8f", 4: "#3a86ff",
  5: "#8338ec", 6: "#ff006e", 7: "#06a77d", 8: "#ffb703"
};

/* ==========================================================================
   MAPA (Leaflet)
   ========================================================================== */

const map = L.map('map', { zoomControl: true, preferCanvas: false })
  .setView([HOTEL.lat, HOTEL.lng], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(map);

const markers = [];
const polylines = [];

/* --- Marcador do Hotel --- */
const homeIcon = L.divIcon({
  html: '<div class="marker-home">🏨</div>',
  className: '', iconSize:[38,38], iconAnchor:[19,19], popupAnchor:[0,-18]
});
const homeMarker = L.marker([HOTEL.lat, HOTEL.lng], { icon: homeIcon, zIndexOffset: 1000 })
  .bindPopup(buildPopup({
    name: "🏨 " + HOTEL.name,
    address: HOTEL.address,
    lat: HOTEL.lat, lng: HOTEL.lng,
    desc: "Sua base na viagem. A pé de Grand Central, Rockefeller e da 5th Ave."
  }, true))
  .addTo(map);

/* --- Marcadores dos locais --- */
LOCATIONS.forEach((loc, idx) => {
  const color = DAY_COLORS[loc.day];
  const textColor = (loc.day === 2 || loc.day === 8) ? "#1a1a2e" : "#fff";
  const featured = loc.featured ? "featured" : "";
  const html = `<div class="marker-circle ${featured}" style="background:${color}; color:${textColor};">${loc.day}</div>`;
  const size = loc.featured ? 36 : 30;
  const icon = L.divIcon({
    html, className: '',
    iconSize: [size, size], iconAnchor:[size/2, size/2], popupAnchor:[0, -size/2]
  });
  const marker = L.marker([loc.lat, loc.lng], { icon })
    .bindPopup(buildPopup(loc, false))
    .addTo(map);
  marker._loc = loc;
  marker._idx = idx;
  markers.push(marker);
});

/* --- Polylines por dia (ordem cronológica) --- */
for (let d = 1; d <= 8; d++) {
  const dayStops = LOCATIONS.filter(l => l.day === d && !l.name.includes("(alt.)"))
                             .sort((a,b) => a.order - b.order);
  if (dayStops.length < 2) continue;
  const coords = dayStops.map(s => [s.lat, s.lng]);
  const line = L.polyline(coords, {
    color: DAY_COLORS[d], weight: 3, opacity: 0.55, dashArray: "6, 8"
  });
  line._day = d;
  polylines.push(line);
}

function buildPopup(loc, isHome) {
  const gmapsSearch = `https://www.google.com/maps/search/?api=1&query=${loc.lat},${loc.lng}`;
  const gmapsWalk   = `https://www.google.com/maps/dir/?api=1&origin=${HOTEL.lat},${HOTEL.lng}&destination=${loc.lat},${loc.lng}&travelmode=walking`;
  let html = `<div class="popup">`;
  html += `<h3>${loc.featured ? "⭐ " : ""}${loc.name}${loc.time ? ` <span style="color:#888;font-weight:400;font-size:12px;">· ${loc.time}</span>` : ""}</h3>`;
  html += `<div class="addr">📍 ${loc.address}</div>`;
  if (loc.desc) html += `<div class="desc">${loc.desc}</div>`;
  if (loc.tip)  html += `<div class="tip">${loc.tip}</div>`;
  const metaParts = [];
  if (loc.duration) metaParts.push(`⏳ ${loc.duration}`);
  if (loc.cost)     metaParts.push(`💰 ${loc.cost}`);
  if (metaParts.length) html += `<div class="meta">${metaParts.join(" · ")}</div>`;
  html += `<div class="btns">
    <a href="${gmapsSearch}" target="_blank" rel="noopener">📍 Google Maps</a>`;
  if (!isHome) html += `<a class="walk" href="${gmapsWalk}" target="_blank" rel="noopener">🚶 Rota do hotel</a>`;
  html += `</div></div>`;
  return html;
}

/* ==========================================================================
   SIDEBAR
   ========================================================================== */

const sidebar = document.getElementById('sidebar');

function buildSidebar() {
  let html = '';
  for (let d = 1; d <= 8; d++) {
    const meta = DAYS_META[d];
    const stops = LOCATIONS.filter(l => l.day === d).sort((a,b) => a.order - b.order);
    html += `<div class="day-card" data-day="${d}">
      <div class="day-header" onclick="toggleDay(${d})">
        <div class="num">${d}</div>
        <div class="title">Dia ${d} — ${meta.title}<small>${meta.mood}</small></div>
        <div class="toggle">▸</div>
      </div>
      <div class="day-body">
        <div class="day-meta">${meta.km} · Gasto: ${meta.spend}</div>`;
    stops.forEach((s, i) => {
      const globalIdx = LOCATIONS.indexOf(s);
      html += `<div class="stop" data-idx="${globalIdx}" onclick="focusStop(${globalIdx})">
        <div class="time">${s.time}</div>
        <div class="info">
          <div class="name">${s.featured ? "⭐ " : ""}${s.name}</div>
          <div class="addr">${s.address}</div>
          ${s.duration ? `<span class="tag">⏳ ${s.duration}</span>` : ""}
          ${s.cost     ? `<span class="tag cost">💰 ${s.cost}</span>` : ""}
        </div>
      </div>`;
    });
    html += `</div></div>`;
  }
  sidebar.innerHTML = html;
}
buildSidebar();

function toggleDay(d) {
  const card = document.querySelector(`.day-card[data-day="${d}"]`);
  card.classList.toggle('open');
}

function focusStop(idx) {
  const loc = LOCATIONS[idx];
  const marker = markers[idx];
  map.flyTo([loc.lat, loc.lng], 16, { duration: 0.8 });
  setTimeout(() => marker.openPopup(), 600);
  document.querySelectorAll('.stop').forEach(el => el.classList.remove('active-stop'));
  const el = document.querySelector(`.stop[data-idx="${idx}"]`);
  if (el) {
    el.classList.add('active-stop');
    const card = el.closest('.day-card');
    if (card && !card.classList.contains('open')) card.classList.add('open');
  }
}

/* ==========================================================================
   FILTROS
   ========================================================================== */

const filterBtns = document.querySelectorAll('#filters button');
filterBtns.forEach(btn => btn.addEventListener('click', () => applyFilter(btn.dataset.day)));

function applyFilter(dayKey) {
  filterBtns.forEach(b => b.classList.toggle('active', b.dataset.day === dayKey));

  // markers
  markers.forEach(m => {
    const loc = m._loc;
    const show = (dayKey === 'all') || (String(loc.day) === dayKey);
    if (show) { if (!map.hasLayer(m)) m.addTo(map); }
    else     { if (map.hasLayer(m)) map.removeLayer(m); }
  });

  // hotel sempre visível exceto se clicar explicitamente em "Hotel" (mostra só hotel)
  if (dayKey === '0') {
    markers.forEach(m => { if (map.hasLayer(m)) map.removeLayer(m); });
  }

  // polylines
  polylines.forEach(line => {
    const show = (dayKey === 'all') || (String(line._day) === dayKey);
    if (show) { if (!map.hasLayer(line)) line.addTo(map); }
    else     { if (map.hasLayer(line)) map.removeLayer(line); }
  });

  // cards do sidebar
  document.querySelectorAll('.day-card').forEach(card => {
    card.style.display = (dayKey === 'all' || dayKey === '0' || card.dataset.day === dayKey) ? '' : 'none';
    if (dayKey !== 'all' && dayKey !== '0') {
      card.classList.toggle('open', card.dataset.day === dayKey);
    }
  });

  // fit bounds
  if (dayKey === 'all') {
    const group = L.featureGroup([homeMarker, ...markers]);
    map.fitBounds(group.getBounds().pad(0.15));
  } else if (dayKey === '0') {
    map.flyTo([HOTEL.lat, HOTEL.lng], 15, { duration: 0.8 });
  } else {
    const dayMarkers = markers.filter(m => String(m._loc.day) === dayKey);
    if (dayMarkers.length) {
      const group = L.featureGroup([homeMarker, ...dayMarkers]);
      map.fitBounds(group.getBounds().pad(0.2));
    }
  }

  try { localStorage.setItem('nyc-last-day', dayKey); } catch(e){}
}

/* ==========================================================================
   INIT
   ========================================================================== */

const savedDay = (() => { try { return localStorage.getItem('nyc-last-day'); } catch(e){ return null; } })();
applyFilter(savedDay || 'all');
// abrir Dia 1 por padrão se sem estado salvo
if (!savedDay) document.querySelector('.day-card[data-day="1"]').classList.add('open');
</script>
