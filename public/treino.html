<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia de Treino — Full Body 3x</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1b1e24; --slate:#2a2e37; --amber:#f0a020; --amber-d:#c47e0c;
    --paper:#f7f4ee; --card:#ffffff; --line:#d9d3c7; --muted:#6c6a64;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Barlow',sans-serif;background:#e9e5dc;color:var(--ink);padding:24px}
  .day{
    background:var(--paper);max-width:860px;margin:0 auto 28px;padding:30px 34px 38px;
    box-shadow:0 4px 18px rgba(0,0,0,.12);border-radius:4px;
  }
  .hd{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:3px solid var(--ink);padding-bottom:12px;margin-bottom:6px}
  .hd h1{font-family:'Oswald';font-weight:700;font-size:30px;letter-spacing:.5px;text-transform:uppercase;line-height:1}
  .hd h1 span{color:var(--amber-d)}
  .hd .sub{font-family:'Oswald';font-weight:500;font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
  .meta{font-size:13px;color:var(--muted);margin:8px 0 18px;font-weight:500}
  .meta b{color:var(--ink)}
  .ex{display:flex;gap:18px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}
  .ex:last-child{border-bottom:none}
  .figs{display:flex;gap:6px;flex:0 0 auto}
  .figbox{width:96px;text-align:center}
  .figbox svg{width:96px;height:100px;display:block;background:#fff;border:1px solid var(--line);border-radius:6px}
  .figbox .lab{font-family:'Oswald';font-size:9px;font-weight:600;letter-spacing:1px;color:#fff;background:var(--slate);padding:2px 0;border-radius:0 0 4px 4px;margin-top:-1px}
  .figbox .lab.e{background:var(--amber-d)}
  .info{flex:1}
  .info .name{font-family:'Oswald';font-weight:600;font-size:18px;text-transform:uppercase;letter-spacing:.3px}
  .info .scheme{display:inline-block;font-family:'Oswald';font-weight:600;font-size:12px;color:#fff;background:var(--ink);padding:2px 9px;border-radius:3px;margin:3px 0 5px;letter-spacing:.5px}
  .info .cue{font-size:13.5px;color:#33363d;line-height:1.4}
  .info .cue b{color:var(--amber-d)}
  .info .vid{display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-family:'Oswald';font-weight:600;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:var(--amber-d);text-decoration:none;border:1.5px solid var(--amber);border-radius:4px;padding:3px 9px}
  .info .vid:hover{background:var(--amber);color:#fff}
  .info .vid svg{width:11px;height:11px}
  @media print{.info .vid{border-color:#999;color:#555}}
  .fin{margin-top:14px;background:var(--ink);color:#fff;padding:12px 16px;border-radius:6px}
  .fin .t{font-family:'Oswald';font-weight:600;letter-spacing:1px;color:var(--amber);font-size:13px;text-transform:uppercase}
  .fin .d{font-size:13.5px;margin-top:3px;line-height:1.4}
  .foot{margin-top:16px;font-size:11px;color:var(--muted);text-align:center;font-style:italic}
  @media print{
    body{background:#fff;padding:0}
    .day{box-shadow:none;margin:0;max-width:100%;page-break-after:always;border-radius:0;min-height:100vh}
    .day:last-child{page-break-after:auto}
  }
  @page{margin:12mm}
</style>
</head>
<body>
<div id="root"></div>
<script>
const NS="http://www.w3.org/2000/svg";

// ---------- FRONT view renderer ----------
function front(p){
  const seg=(a,b,w)=>`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="#2a2e37" stroke-width="${w}" stroke-linecap="round"/>`;
  let s=`<svg viewBox="0 0 200 210" xmlns="${NS}">`;
  s+=p.eq||"";
  // legs
  s+=seg(p.pv,p.hL,7)+seg(p.pv,p.hR,7);
  s+=seg(p.hL,p.kL,7)+seg(p.kL,p.aL,6);
  s+=seg(p.hR,p.kR,7)+seg(p.kR,p.aR,6);
  // torso
  s+=seg(p.nk,p.pv,9);
  // shoulders
  s+=seg(p.sL,p.sR,7);
  // arms
  s+=seg(p.sL,p.eL,5)+seg(p.eL,p.wL,5);
  s+=seg(p.sR,p.eR,5)+seg(p.eR,p.wR,5);
  // head
  s+=`<circle cx="${p.hd[0]}" cy="${p.hd[1]}" r="${p.hd[2]}" fill="#2a2e37"/>`;
  s+="</svg>";
  return s;
}
// ---------- SIDE view renderer ----------
function side(p){
  const seg=(a,b,w)=>`<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="#2a2e37" stroke-width="${w}" stroke-linecap="round"/>`;
  let s=`<svg viewBox="0 0 200 210" xmlns="${NS}">`;
  s+=p.eq||"";
  // back leg (lighter)
  if(p.kn2){
    s+=`<line x1="${p.hip[0]}" y1="${p.hip[1]}" x2="${p.kn2[0]}" y2="${p.kn2[1]}" stroke="#9aa0ab" stroke-width="6" stroke-linecap="round"/>`;
    s+=`<line x1="${p.kn2[0]}" y1="${p.kn2[1]}" x2="${p.an2[0]}" y2="${p.an2[1]}" stroke="#9aa0ab" stroke-width="5" stroke-linecap="round"/>`;
  }
  // front leg
  s+=seg(p.hip,p.kn,7)+seg(p.kn,p.an,6);
  // torso
  s+=seg(p.nk,p.pv,9);
  // arm
  s+=seg(p.sh,p.el,5)+seg(p.el,p.wr,5);
  if(p.el2){s+=seg(p.sh,p.el2,5)+seg(p.el2,p.wr2,5);}
  // head
  s+=`<circle cx="${p.hd[0]}" cy="${p.hd[1]}" r="${p.hd[2]}" fill="#2a2e37"/>`;
  s+="</svg>";
  return s;
}
// equipment helpers
const bar=(x1,y1,x2,y2)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${'#c47e0c'}" stroke-width="4" stroke-linecap="round"/>`+
  `<circle cx="${x1}" cy="${y1}" r="6" fill="#f0a020"/><circle cx="${x2}" cy="${y2}" r="6" fill="#f0a020"/>`;
const db=(x,y)=>`<rect x="${x-7}" y="${y-3.5}" width="14" height="7" rx="2" fill="#f0a020"/><rect x="${x-9}" y="${y-6}" width="3.5" height="12" rx="1.5" fill="#c47e0c"/><rect x="${x+5.5}" y="${y-6}" width="3.5" height="12" rx="1.5" fill="#c47e0c"/>`;
const ball=(x,y,r)=>`<circle cx="${x}" cy="${y}" r="${r}" fill="#f0a020" stroke="#c47e0c" stroke-width="2"/>`;
const kb=(x,y,r)=>`<circle cx="${x}" cy="${y}" r="${r}" fill="#3a3e47"/><path d="M ${x-r*0.6} ${y-r*0.4} Q ${x} ${y-r*1.6} ${x+r*0.6} ${y-r*0.4}" fill="none" stroke="#3a3e47" stroke-width="3"/>`;
const cable=(x1,y1,x2,y2)=>`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#8a8f99" stroke-width="2" stroke-dasharray="3 3"/>`;
const rect=(x,y,w,h)=>`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="#d8dadf" stroke="#b6b9c0" stroke-width="1.5"/>`;

DAYS.forEach(d=>{
