<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>24° Festival de Pão com Bolinho – Curitiba 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--amb:#E8A020;--dark:#1A1208;--rust:#C4410C;}
body{font-family:system-ui,sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--dark);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;border-bottom:3px solid var(--amb);flex-shrink:0;}
header h1{font-size:15px;font-weight:500;color:var(--amb);line-height:1.2;}
header p{font-size:11px;color:rgba(255,255,255,.55);margin-top:2px;}
.badge{background:var(--amb);color:var(--dark);font-weight:700;font-size:12px;padding:4px 12px;border-radius:100px;white-space:nowrap;flex-shrink:0;}
.searchbar{background:var(--dark);padding:6px 16px 8px;flex-shrink:0;}
.searchbar input{width:100%;max-width:440px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 12px;color:#fff;font-size:12px;outline:none;}
.searchbar input::placeholder{color:rgba(255,255,255,.38);}
.searchbar input:focus{border-color:var(--amb);}
.layout{display:flex;flex:1;overflow:hidden;}
.sidebar{width:270px;flex-shrink:0;background:#fff;border-right:1px solid #e8e0d0;display:flex;flex-direction:column;overflow:hidden;}
.sbh{padding:8px 12px;border-bottom:1px solid #e8e0d0;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#9a7c50;}
.list{overflow-y:auto;flex:1;}
.list::-webkit-scrollbar{width:3px;}
.list::-webkit-scrollbar-thumb{background:#d4c5a8;border-radius:3px;}
.item{padding:8px 12px;border-bottom:1px solid #f5ede0;cursor:pointer;display:flex;align-items:flex-start;gap:8px;transition:background .15s;}
.item:hover,.item.on{background:rgba(232,160,32,.12);}
.num{background:var(--amb);color:var(--dark);font-size:9px;font-weight:700;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.iname{font-size:12px;font-weight:600;color:#1a1208;line-height:1.3;}
.imeta{font-size:10px;color:#8a6f48;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#map{flex:1;}
.pin{width:26px;height:26px;background:var(--amb);border:2px solid var(--dark);border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 5px rgba(0,0,0,.3);}
.pin span{transform:rotate(45deg);font-size:8px;font-weight:800;color:var(--dark);line-height:1;}
.pin.act{background:var(--rust);border-color:var(--rust);}
.pin.act span{color:#fff;}
.leaflet-popup-content-wrapper{border-radius:8px;box-shadow:0 4px 20px rgba(0,0,0,.16);border:1.5px solid var(--amb);padding:0;overflow:hidden;}
.leaflet-popup-content{margin:0;width:220px!important;}
.leaflet-popup-tip{background:var(--amb);}
.ph{background:var(--dark);color:var(--amb);padding:9px 11px 7px;}
.pn{font-size:9px;font-weight:700;opacity:.55;text-transform:uppercase;letter-spacing:.06em;}
.pt{font-size:13px;font-weight:500;line-height:1.2;margin-top:2px;}
.pb{padding:9px 11px;background:#fff;}
.pr{display:flex;gap:5px;align-items:flex-start;margin-bottom:4px;font-size:11px;color:#3d2b0a;}
.pr a{color:var(--rust);text-decoration:none;font-weight:500;font-size:10px;}
footer{background:var(--dark);color:rgba(255,255,255,.35);font-size:10px;text-align:center;padding:5px;flex-shrink:0;}
@media(max-width:580px){.sidebar{display:none;}}
</style>
</head>

const lst=document.getElementById('lst');
P.forEach((p,i)=>{
  const d=document.createElement('div');d.className='item';
  d.innerHTML=`<div class="num">${p.n}</div><div style="flex:1;min-width:0"><div class="iname">${p.name}</div><div class="imeta">${p.b} · ${p.a}</div></div>`;
  lst.appendChild(d);
});
const map=L.map('map').setView([-25.448,-49.29],13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{attribution:'&copy; CARTO',maxZoom:19}).addTo(map);
function ico(n,act){return L.divIcon({className:'',html:`<div class="pin${act?' act':''}"><span>${n}</span></div>`,iconSize:[26,26],iconAnchor:[13,26],popupAnchor:[0,-28]});}
const MK=[],IT=[...lst.querySelectorAll('.item')];let cur=null;
function activate(i){if(cur!==null){MK[cur].setIcon(ico(P[cur].n,false));IT[cur].classList.remove('on');}MK[i].setIcon(ico(P[i].n,true));IT[i].classList.add('on');IT[i].scrollIntoView({behavior:'smooth',block:'nearest'});cur=i;}
P.forEach((p,i)=>{
  const pop=`<div class="ph"><div class="pn">Local #${p.n}</div><div class="pt">${p.name}</div></div><div class="pb"><div class="pr">📍 ${p.a} – ${p.b}</div><div class="pr">🕐 ${p.h}</div><div class="pr">💰 R$ 27,00</div><div class="pr">🔗 <a href="https://maps.google.com/?q=${encodeURIComponent(p.a+', '+p.b+', Curitiba')}" target="_blank">Abrir no Google Maps ↗</a></div></div>`;
  const mk=L.marker([p.lat,p.lng],{icon:ico(p.n,false)}).addTo(map).bindPopup(pop,{maxWidth:240});
  MK.push(mk);
  IT[i].addEventListener('click',()=>{activate(i);map.setView([p.lat,p.lng],16,{animate:true});mk.openPopup();});
  mk.on('click',()=>activate(i));
});
document.getElementById('q').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  P.forEach((p,i)=>{const ok=!q||p.name.toLowerCase().includes(q)||p.b.toLowerCase().includes(q)||p.a.toLowerCase().includes(q);IT[i].style.display=ok?'':'none';if(ok)MK[i].addTo(map);else MK[i].remove();});
});
</script>

</html>
