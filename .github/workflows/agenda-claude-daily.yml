name: Update Agenda Claude

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 */2 * *'

permissions:
  contents: write

jobs:
  update-agenda:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch Instagram via Apify + analyze with Gemini
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          APIFY_ACTOR_ID: apify/instagram-api-scraper
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          GEMINI_REQUEST_DELAY_MS: 6500
          MAX_POSTS_PER_VENUE: 3
          MAX_IMAGES_PER_POST: 1
          VENUE_BATCHES: 2
          VENUE_BATCH_ROTATION_DAYS: 2
        run: npm run agenda:fetch

      - name: Build Claude agenda JSON
        run: node scripts/update-agenda-claude.js

      - name: Commit
        run: |
          git diff --quiet -- content/agenda-source.json public/agenda_rock.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/agenda-source.json public/agenda_rock.json
          git commit -m "chore: update Agenda Claude data"
          git push
